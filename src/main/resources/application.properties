spring.application.name=SpringDataRest

# Configuration du serveur
server.port=8082
spring.data.rest.base-path=/api

# Connexion MySQL locale (PhpMyAdmin) en dur
spring.datasource.url=jdbc:mysql://localhost:3306/miola?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Documentation API
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html