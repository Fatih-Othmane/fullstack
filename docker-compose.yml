version: "3.8"

services:
  springboot-app:
    container_name: springboot-app
    build: .
    ports:
      - "9090:8082"
    environment:
      - MYSQL_HOST=mysqldb
      - MYSQL_USER=root
      - MYSQL_PASSWORD=
      - MYSQL_PORT=3306
    depends_on:
      - mysqldb
    networks:
      - spring-net

  mysqldb:
    container_name: mysqldb
    image: mysql:latest
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=miola
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - spring-net

networks:
  spring-net:
    driver: bridge

volumes:
  mysql_data: